<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A basic HTML layout template for web development.">
    <meta name="author" content="Justin Kilpack">
    <title>Basic HTML Structure</title>
    
</head>
<body>
    <header>
        <img src="images/basic-logo.png" alt="HTML Logo" width="128" height="128">
        width="128" height="128">
    </header>
    <nav>
        <ul>
            <li><a href="https://google.com">Google</a></li>
            <li><a href="https://lds.org">The Church of Jesus Christ of Latter-day Saints</a></li>
        </ul>
    </nav>
    <main>
        <h1>"Basic HTML Structure"</h1>
        <section>
            <h2>Heading</h2>
            <p>This is a simple paragraph within the main content area.</p>
        </section>
        <section>
            <h2>Heading</h2>
            <p>This is another simple paragraph within the main content area.</p>
        </section>
    </main>
    <aside>
        <img src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/anchorage-alaska/800x450/anchorage-temple-lds-253274-wallpaper.jpg" alt="Anchorage Temple">
    </aside>
    <footer>
        <p>Justin Kilpack</p>
    </footer>
</body>
</html>
